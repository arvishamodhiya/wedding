<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ayush & Kirti | Save the Date</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>

/* Background */
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: radial-gradient(circle at center,#1a1a1a,#000);
font-family:Poppins;
overflow:hidden;
}

/* Firecracker particles */
.firework{
position:absolute;
width:4px;
height:4px;
background:gold;
border-radius:50%;
box-shadow:
0 0 10px gold,
0 0 20px gold,
0 0 40px gold;
animation:explode 2s infinite ease-out;
}

.firework:nth-child(1){ top:10%; left:20%; animation-delay:0s;}
.firework:nth-child(2){ top:20%; left:80%; animation-delay:1s;}
.firework:nth-child(3){ top:80%; left:30%; animation-delay:1.5s;}
.firework:nth-child(4){ top:75%; left:75%; animation-delay:0.5s;}

@keyframes explode{
0%{
transform:scale(0);
opacity:1;
}
100%{
transform:scale(15);
opacity:0;
}
}

/* Card */
.card{
width:450px;
padding:60px 40px;
text-align:center;
border-radius:20px;

background: rgba(255,255,255,0.03);

border:1px solid rgba(255,215,0,0.3);

box-shadow:
0 0 40px rgba(255,215,0,0.2),
inset 0 0 20px rgba(255,215,0,0.1);
}

/* Title */
.title{
font-family:Cinzel;
letter-spacing:4px;
color:gold;
margin-bottom:40px;
font-size:26px;
}

/* Perfect Heart */
.heartBox{
position:relative;
width:150px;
height:150px;
margin:auto;
cursor:pointer;
}

.heart{
position:absolute;
width:100px;
height:100px;
background:linear-gradient(45deg,#FFD700,#ffcc00,#fff2a6);
transform: rotate(-45deg);
top:25px;
left:25px;

animation:heartbeat 1.5s infinite;

box-shadow:
0 0 20px gold,
0 0 40px gold,
0 0 80px rgba(255,215,0,0.6);

transition:1s;
}

.heart:before,
.heart:after{
content:"";
position:absolute;
width:100px;
height:100px;
background:linear-gradient(45deg,#FFD700,#ffcc00,#fff2a6);
border-radius:50%;
}

.heart:before{
top:-50px;
left:0;
}

.heart:after{
left:50px;
top:0;
}

@keyframes heartbeat{
0%{transform: rotate(-45deg) scale(1);}
50%{transform: rotate(-45deg) scale(1.1);}
100%{transform: rotate(-45deg) scale(1);}
}

/* Hidden text */
.hidden{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:0;
transition:1s;
width:300px;
text-align:center;
}

.hidden p{
color:gold;
font-family:Cinzel;
font-size:18px;
line-height:1.6;
}

/* Names */
.names{
margin-top:50px;
font-family:Great Vibes;
font-size:44px;
background:linear-gradient(45deg,#FFD700,#fff2a6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* Reveal */
.reveal .heart{
opacity:0;
transform: rotate(-45deg) scale(0);
}

.reveal .hidden{
opacity:1;
}

</style>

</head>
<body>

<!-- Fireworks -->
<div class="firework"></div>
<div class="firework"></div>
<div class="firework"></div>
<div class="firework"></div>

<div class="card">

<div class="title">SAVE THE DATE</div>

<div class="heartBox" onclick="reveal()" id="heartBox">

<div class="heart"></div>

<div class="hidden">

<p>
Invite you to celebrate our wedding on<br>
<strong>02.02.2027</strong><br>
Save the Date
</p>

</div>

</div>

<div class="names">Ayush & Kirti</div>

</div>

<script>

function reveal(){
document.getElementById("heartBox").classList.add("reveal");
}

</script>

</body>
</html>
