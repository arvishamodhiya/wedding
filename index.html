<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ayush & Kirti | Save the Date</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: radial-gradient(circle,#0a0a0a,#000);
font-family:Poppins;
overflow:hidden;
}

/* Card */
.card{
width:420px;
padding:60px 40px;
text-align:center;
border-radius:25px;
background: rgba(255,255,255,0.03);
border:1px solid rgba(255,215,0,0.3);
box-shadow:0 0 40px rgba(255,140,0,0.3);
position:relative;
z-index:2;
}

/* Title */
.title{
font-family:Cinzel;
letter-spacing:5px;
color:#FFD700;
margin-bottom:40px;
}

/* Heart */
.heartBox{
position:relative;
width:160px;
height:160px;
margin:auto;
cursor:pointer;
}

.heart{
position:absolute;
width:100px;
height:100px;
background: linear-gradient(45deg,#FFD700,#ff8c00,#ff4500);
transform: rotate(-45deg);
top:30px;
left:30px;
box-shadow:0 0 20px #ff8c00,0 0 60px #ff4500;
animation:heartbeat 1.2s infinite;
transition:0.5s;
}

.heart:before,
.heart:after{
content:"";
position:absolute;
width:100px;
height:100px;
background: linear-gradient(45deg,#FFD700,#ff8c00,#ff4500);
border-radius:50%;
}

.heart:before{ top:-50px; left:0; }
.heart:after{ left:50px; top:0; }

@keyframes heartbeat{
0%{transform: rotate(-45deg) scale(1);}
50%{transform: rotate(-45deg) scale(1.15);}
100%{transform: rotate(-45deg) scale(1);}
}

/* Spark */
.spark{
position:absolute;
width:6px;
height:6px;
background:gold;
border-radius:50%;
pointer-events:none;
box-shadow:0 0 10px gold,0 0 20px orange;
animation:explode 1s forwards;
}

@keyframes explode{
0%{transform:translate(0,0);opacity:1;}
100%{transform:translate(var(--x),var(--y));opacity:0;}
}

/* Glitter rain */
.glitter{
position:absolute;
top:-10px;
width:6px;
height:6px;
background:gold;
border-radius:50%;
box-shadow:0 0 10px gold,0 0 20px orange;
animation:fall linear forwards;
z-index:1;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

/* Hidden text */
.hidden{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:0;
transition:1s;
width:260px;
color:white;
text-align:center;
}

.date{
color:#FFD700;
font-size:24px;
font-family:Cinzel;
}

.save{
color:#ff8c00;
letter-spacing:4px;
}

/* Names */
.names{
margin-top:50px;
font-family:Great Vibes;
font-size:46px;
background: linear-gradient(45deg,#FFD700,#ff8c00,#ff4500);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.reveal .heart{
opacity:0;
transform: rotate(-45deg) scale(0);
}

.reveal .hidden{
opacity:1;
}

</style>
</head>

<body>

<div class="card">

<div class="title">SAVE THE DATE</div>

<div class="heartBox" onclick="startEffect()" id="heartBox">

<div class="heart"></div>

<div class="hidden">
<div>invite you to celebrate their wedding on</div>
<div class="date">02.02.2027</div>
<div class="save">SAVE THE DATE</div>
</div>

</div>

<div class="names">Ayush & Kirti</div>

</div>

<script>

function startEffect(){

let box=document.getElementById("heartBox");

/* Explosion sparks */
for(let i=0;i<40;i++){

let spark=document.createElement("div");
spark.className="spark";

let x=(Math.random()-0.5)*300+"px";
let y=(Math.random()-0.5)*300+"px";

spark.style.setProperty("--x",x);
spark.style.setProperty("--y",y);

spark.style.left="80px";
spark.style.top="80px";

box.appendChild(spark);

setTimeout(()=>spark.remove(),1000);
}

/* Glitter rain */
for(let i=0;i<80;i++){

let glitter=document.createElement("div");
glitter.className="glitter";

glitter.style.left=Math.random()*100+"vw";
glitter.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(glitter);

setTimeout(()=>glitter.remove(),5000);

}

/* Reveal text */
setTimeout(()=>{
box.classList.add("reveal");
},500);

}

</script>

</body>
</html>
